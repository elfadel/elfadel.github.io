title: El-Fadel Bonfoh · Architecte DevOps
description: >-
  Architecte DevOps senior — CI/CD, Kubernetes, DevSecOps, AWS,
  observabilité et architectures cloud pour environnements critiques.
baseurl: ""
url: "https://elfadel.github.io"
lang: fr

author:
  name: El-Fadel Bonfoh
  url: https://elfadel.github.io
  email: bonfohelfadel@gmail.com

# Build
markdown: kramdown
include:
  - _pages

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Permalinks
permalink: /articles/:slug

# Front matter defaults — évite de répéter layout/author dans chaque post
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: "El-Fadel Bonfoh"
      lang: fr

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - GUIDE_ARTICLES.md
  - _site
  - .sass-cache
  - .jekyll-cache
